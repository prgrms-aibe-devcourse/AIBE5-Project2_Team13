spring.application.name=hobby-matching

# =======================================================
# [1] 프로파일 설정
# =======================================================
# application-secret.properties 파일을 포함시킵니다.
spring.profiles.include=secret

# =======================================================
# [2] 데이터베이스 공통 설정
# =======================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =======================================================
# [3] JPA (Java Persistence API) 설정
# =======================================================
# [주의] 실제 운영 서버에서는 데이터 손실/변경을 막기 위해 'update' 대신,
# 테이블 생성 여부만 확인하는 'validate'나 'none'으로 설정하는 것이 안전합니다!
spring.jpa.hibernate.ddl-auto=update

# JPA가 실행하는 SQL 쿼리를 콘솔에 출력합니다.
spring.jpa.show-sql=true

# SQL 쿼리를 보기 좋게 정렬해서 출력합니다.
spring.jpa.properties.hibernate.format_sql=true

# =======================================================
# [4] 파일 업로드 설정 (AWS S3 연동 예정)
# =======================================================
# 파일 업로드 용량을 제한 설정입니다.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 파일 인코딩을 UTF-8로 설정하여 한글 깨짐을 방지합니다.
spring.mandatory-file-encoding=UTF-8

# =======================================================
# [5] JWT (JSON Web Token) 설정
# =======================================================
# 토큰 만료 시간 (밀리초 단위) - 예: 86,400,000 = 24시간 , 1,800,000밀리초 = 30분
jwt.expiration=1800000